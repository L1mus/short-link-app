basePath: /
definitions:
  dto.ForgotPasswordDTO:
    properties:
      expired_at:
        type: string
      token:
        type: string
    type: object
  dto.ForgotPasswordRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  dto.LoginDTO:
    properties:
      email:
        example: John.Doe@mail.com
        type: string
      token:
        type: string
    type: object
  dto.LoginRequest:
    properties:
      email:
        example: example@mail.com
        type: string
      password:
        example: example123
        type: string
    required:
    - email
    - password
    type: object
  dto.LoginResponse:
    properties:
      data:
        $ref: '#/definitions/dto.LoginDTO'
      message:
        example: Welcome, John doe
        type: string
      status:
        example: success
        type: string
    type: object
  dto.RegisterDTO:
    properties:
      created-at:
        example: "2026-05-19T23:35:11.88652Z"
        type: string
      email:
        example: example@mail.com
        type: string
      full_name:
        example: John Doe
        type: string
      id:
        example: 101
        type: integer
    type: object
  dto.RegisterRequest:
    properties:
      confirm_password:
        example: example123
        type: string
      email:
        example: example@mail.com
        type: string
      password:
        example: example123
        minLength: 8
        type: string
    required:
    - confirm_password
    - email
    - password
    type: object
  dto.RegisterResponse:
    properties:
      data:
        $ref: '#/definitions/dto.RegisterDTO'
      message:
        example: Welcome, John doe
        type: string
      status:
        example: success
        type: string
    type: object
  dto.ResetPasswordRequest:
    properties:
      new_password:
        minLength: 8
        type: string
      token:
        type: string
    required:
    - new_password
    - token
    type: object
  dto.ResponseError:
    properties:
      error:
        example: internal server error/bad request
        type: string
      message:
        example: Failed get data/internal server error
        type: string
      status:
        example: error
        type: string
    type: object
  dto.ResponseSuccess:
    properties:
      message:
        example: Welcome, John doe
        type: string
      status:
        example: success
        type: string
    type: object
host: localhost:80/api
info:
  contact:
    email: limustadji@gmail.com
    name: Ali Mustadji
    url: https://github.com/L1mus
  description: This is a backend project for a web application called E-wallet.
  license:
    name: MIT
  title: E-Wallet API
  version: "1.0"
paths:
  /auth:
    post:
      consumes:
      - application/json
      description: login into user account
      parameters:
      - description: Login Payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.LoginResponse'
        "400":
          description: Email or pass wrong || binding error
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ResponseError'
      summary: Login account
      tags:
      - Auth
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Request a password reset token. In production this would be sent
        via email. Token is valid for 1 hour.
      parameters:
      - description: Forgot Password Payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.ResponseSuccess'
            - properties:
                data:
                  $ref: '#/definitions/dto.ForgotPasswordDTO'
              type: object
        "400":
          description: invalid email format
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "404":
          description: user not found
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/dto.ResponseError'
      summary: Forgot password
      tags:
      - Auth
  /auth/logout:
    post:
      description: Blacklist current active session token
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ResponseSuccess'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ResponseError'
      security:
      - BearerAuth: []
      summary: Logout account
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: create user account
      parameters:
      - description: Register Payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.RegisterResponse'
        "400":
          description: required field || invalid format || email already exist
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ResponseError'
      summary: Register account
      tags:
      - Auth
  /auth/reset-password:
    post:
      consumes:
      - application/json
      description: Reset user password using a valid token from forgot-password endpoint.
        Token can only be used once and expires in 1 hour.
      parameters:
      - description: Reset Password Payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ResponseSuccess'
        "400":
          description: Validate Binding GIN
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "404":
          description: token not found
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "422":
          description: token used | token expired
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/dto.ResponseError'
      summary: Reset password
      tags:
      - Auth
securityDefinitions:
  ApiKeyAuth:
    description: Bearer token used for authorization
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
