# network
bind 0.0.0.0
port 6379

# docker logging
daemonize no
logfile ""
loglevel notice

# RDB Persistence
save 3600 1
save 300 100
save 60 10000

# AOF Persistence
appendonly yes
appendfsync everysec

# memory management
maxmemory         100mb
maxmemory-policy  allkeys-lru

# user management
user default on nopass ~* &* +@all

# superuser
user superuser on >admin ~* &* +@all

# normal user
user your_username on >your_password ~your_key:* ~blacklist:* ~user:* &* -@all +@string +exists +del +expire +@keyspace +@read +ttl +ping