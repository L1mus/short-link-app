server {
    listen 3000;
    server_name _;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://container-backend:8080/;
        proxy_set_header Host $host;
    }
}